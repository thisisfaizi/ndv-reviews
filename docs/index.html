<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NDV Reviews — Documentation</title>
	<meta name="description" content="Developer and user documentation for NDV Reviews, the reliable self-hosted WooCommerce reviews plugin.">
	<link rel="stylesheet" href="assets/style.css">
</head>
<body>
	<header class="site-header">
		<div class="brand">
			<span class="brand-mark">NDV</span>
			<span class="brand-name">Reviews <em>Docs</em></span>
		</div>
		<input id="search" type="search" placeholder="Search the docs…" autocomplete="off" aria-label="Search documentation">
		<a class="ghlink" href="#" data-doc="overview">Overview</a>
	</header>

	<div class="layout">
		<nav class="sidebar" id="nav" aria-label="Documentation navigation"></nav>
		<main class="content">
			<article id="doc" class="markdown-body">
				<p class="loading">Loading documentation…</p>
			</article>
			<div id="search-results" class="search-results" hidden></div>
		</main>
	</div>

	<footer class="site-footer">
		<p>NDV Reviews — a Nowdigiverse product. Built phase by phase; this site is updated with every phase.</p>
	</footer>

	<script src="assets/app.js"></script>
</body>
</html>
